version: "2"

run:
  timeout: 5m

linters:
  enable:
    # Correctness
    - errcheck       # unhandled errors
    - govet          # vet checks (shadowing, printf formats, etc.)
    - staticcheck    # advanced static analysis
    - unused         # unexported identifiers that are never used
    - nilerr         # return nil instead of err accidentally
    - bodyclose      # unclosed http.Response.Body leaks
    - sqlclosecheck  # unclosed sql.Rows/Stmt leaks

    # Security
    - gosec          # OWASP-aligned security checks

    # Error handling
    - wrapcheck      # errors from external packages must be wrapped
    - noctx          # http.NewRequest without context

    # Style & quality
    - gocritic       # opinionated style and correctness checks
    - revive         # fast, configurable replacement for golint

    # Complexity
    - cyclop         # cyclomatic complexity
    - gocognit       # cognitive complexity

    # Quality
    - dupl           # copy-paste detection
    - goconst        # string literals that could be constants
    - ineffassign    # assignments whose result is never used
    - unconvert      # unnecessary type conversions
    - unparam        # unused function parameters

    # nolint discipline
    - nolintlint     # bare //nolint without linter name or reason

  settings:
    revive:
      rules:
        - name: exported
          disabled: true  # interface docstrings cover the contract; impl methods don't need duplicates

    cyclop:
      max-complexity: 20

    gocognit:
      min-complexity: 30

    gosec:
      excludes:
        - G104 # unhandled errors — covered by errcheck

    wrapcheck:
      ignorePackageGlobs:
        - github.com/iPFSoftwares/custos/internal/*
        - github.com/go-chi/chi/*

    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - wrapcheck
          - dupl
          - gosec
          - noctx    # httptest.NewRequest without context is idiomatic in handler tests
          - goconst  # repeated string literals in table-driven tests are fine

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/iPFSoftwares/custos
