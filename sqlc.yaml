version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/store/postgres/queries"
    schema: "migrations"
    gen:
      go:
        package: "generated"
        out: "internal/store/postgres/generated"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_db_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "pg_catalog.varchar"
            go_type: "string"
